<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <style>
      .tatlist-text {
        font-family: 'Arial Black', sans-serif;
        font-weight: 900;
        font-size: 36px;
        fill: #000000;
      }
      .tagline {
        font-family: Arial, sans-serif;
        font-size: 8px;
        fill: #666666;
        letter-spacing: 1px;
      }
    </style>
  </defs>

  <!-- Main Logo Text -->
  <text x="100" y="35" text-anchor="middle" class="tatlist-text">TATLIST</text>

  <!-- Tagline -->
  <text x="100" y="50" text-anchor="middle" class="tagline">TAMPA TATTOO SUPPLY</text>

  <!-- Decorative elements -->
  <rect x="10" y="25" width="20" height="4" fill="#FFB347" rx="2"/>
  <rect x="170" y="25" width="20" height="4" fill="#FFB347" rx="2"/>
</svg>
